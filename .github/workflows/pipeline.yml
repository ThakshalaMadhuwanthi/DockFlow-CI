name : deploy via push
on: 
 push:
   branches:
     - main
jobs:
  build_docker_image:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: login to docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest  .

      - name: Push Docker image
        run: docker push  ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest  

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: | 
            docker pull ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest
            docker stop dockflow-ci || true
            docker rm dockflow-ci || true
            docker run -d -p 80:80 --name dockflow-ci ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest

    

  