name : deploy via push
on: 
 push:
   branches:
     - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: login to docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest  .

      - name: Push Docker image
        run: docker push  ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest  

  deploy:
    needs: build_and_deploy
    runs-on: self-hosted

    steps:
      - name: Pull latest image
        run: docker pull  ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest

      - name: Stop old container
        run: docker stop dockflow-ci || true

      - name: Remove old container
        run: docker rm dockflow-ci || true

      - name: run new container
        run: docker run -d -p 80:80 --name dockflow-ci  ${{ secrets.DOCKER_USERNAME }}/dockflow-ci:latest

    

  